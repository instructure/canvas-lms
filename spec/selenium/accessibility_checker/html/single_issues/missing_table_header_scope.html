<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Missing Table Header Scope</title>
</head>
<body>
  <article>
    <header>
      <h2>Course Overview</h2>
    </header>
    <section>
      <p>The following table summarises the course details.</p>
      <table border="1" cellpadding="10" cellspacing="0">
        <caption>Course Details</caption>
        <thead>
          <tr>
            <th>Topic</th>
            <td>Details</td>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Duration</td>
            <td>12 weeks</td>
          </tr>
          <tr>
            <td>Level</td>
            <td>Beginner</td>
          </tr>
          <tr>
            <td>Format</td>
            <td>Online</td>
          </tr>
        </tbody>
      </table>
    </section>
  </article>
</body>
</html>
