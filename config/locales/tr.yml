  by_reverting_all_canvas_career_features_will_be_di_30059635: "Geri aldığınızda tüm Canvas Career özellikleri devre dışı bırakılır. Geri alma; basitleştirilmiş kullanıcı arayüzü, program yönetimi, yapay zekâ destekli eyleme dönük fikirler ve daha fazlası dâhil olmak üzere özelliklerin kaybına neden olur. Hesap geri alındıktan sonra bu özellikler kullanılamaz."
  by_reverting_this_course_all_canvas_career_feature_5e246288: "Bu dersi geri aldığınızda tüm Canvas Career özellikleri devre dışı bırakılır. Silinen veya değiştirilen içerikler olduğu gibi kalır ve geri getirilemez. Bir dersi geri almak; ilerleme çubuğu, not defteri kayıtları, Yapay Zekâ Asistanı, Skillspace kazanımları ve tahmini süre meta verileri dâhil olmak üzere özelliklerin kaybına neden olur. Ders geri alındıktan sonra bu özellikler kullanılamaz."
  by_selecting_make_all_discussions_threaded_you_wil_cf286418: "Tüm Tartışmaları Dallanmış Yap seçeneğini belirlediğinizde, dersteki dallanmış olmayan tüm tartışmalar dallanmış hâle getirilir. Bu işlem, Dallanmış Yanıtları Engelle seçeneğinin işaretini kaldırarak tüm tartışmalar için dallanmış yanıtları etkinleştirir."
