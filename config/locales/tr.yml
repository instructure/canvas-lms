  this_report_fulfills_a_data_subject_request_dsr_co_227fbadc: "Bu rapor, Canvas LMS ile ilgili bir Veri Sahibi Talebini karşılar. Bu belgenin amacı, konuya ilişkin verileri tablo biçiminde sağlamaktır. Tek tek tabloların açıklamaları aşağıda listelenmiştir. Her tablo kendi sayfasında yer alır. Bir tablo boşsa bu, konuya ilişkin böyle bir veri olmadığı anlamına gelir. Bu belgeye ek olarak, konunun Canvas LMS'ye yüklediği dosyaları içeren bir klasör de vardır. Klasör yapısı, Canvas'ta konunun dosyalarının görünümünü olabildiğince yansıtmaya çalışır."
  this_report_gets_a_count_of_submissions_that_were__207a3d59: |-
      Bu rapor, belirli bir günde gönderilmiş gönderimlerin sayısını getirir.
