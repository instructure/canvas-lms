  if_you_ve_determined_that_no_further_remediation_i_55ee555e: "Bu kaynak için artık ek bir düzeltme planlanmadığına karar verdiyseniz, erişilebilirlik düzeltmesini kapatabilir ve kalan sorunları istatistiklerden hariç tutabilirsiniz. Bu kaynağı düzenlerseniz, yeniden açılır."
