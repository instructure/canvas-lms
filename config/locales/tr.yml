      times participated, last viewed. times viewed ve times participated değerleri,
      başlangıçtan raporun üretildiği ana kadar olan sayaçlardır.
      En fazla bir aylık veri alınır. Varsayılan olarak önceki haftanın başından itibaren veri döndürür.
  this_report_shows_all_the_courses_for_a_given_term_3cdc11e5: "Bu rapor, belirli bir döneme ait tüm dersleri gösterir. Oluşan csv dosyasında ders başına bir satır bulunur ve course id, course sis id, course short name, course name, account id, account sis id, account name, kullanılan depolama MB ve tüm dosyaların toplamı MB bilgilerini gösterir. Kullanılan depolama, ders kotasına dahil edilen tüm dosyaları yansıtır. Dersteki tüm dosyaların toplamı ise kotaya etkisi olsun veya olmasın dersteki tüm dosyaların toplamıdır."
  this_report_shows_grading_period_grades_and_overal_a86346a: "Bu rapor, belirli bir dönemde kayıtlı her öğrenci için notlandırma dönemi notlarını ve genel ders notlarını gösterir. Oluşan csv dosyasında kayıt başına bir satır bulunur."
