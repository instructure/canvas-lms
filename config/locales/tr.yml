      email: 
        body: |-
            Merhaba %{user},
            
            İyi haber! Canvas Network'te kayıtlı olduğunuz %{course} dersi yakında başlıyor.
            
            Bu dersten en iyi şekilde yararlanmanız için öğretim elemanı tarafından listelenmiş ders malzemeleri veya özel yönergeleri kontrol etmelisiniz. Aşağıdaki linke tıklayarak bu bilgilere Canvas Network'te ders detayları sayfasında bulabilirsiniz.
            
            %{url}
            
            Öğrenmeye devam,
            
            Canvas Network
        course_required_materials: "%{course} ders için yönergeler ve materyaller"
    course_started: 
      email: 
        body: |-
            Merhaba %{user},
            
            Canvas Network'teki dersiniz %{course}'in bugün başldığını hatırlatmak isteriz. %{site}'ye giriş yapıp başlayabilirsiniz!
            
            Canvas Network profilinizi oluşturmayı unutmayın. Bu sayede dersteki diğer katılımcılar size tanıyabilirler. Profilinizi %{profile_url} adresinden güncelleyebilirsiniz
            
            Öğrenmeye devam,
            
            Canvas Network
        course_starts_today: "Dersiniz bugün başlıyor"
    course_starts_in_week: 
      email: 
        body: |-
            %{user},
            
            Çok az kaldı! %{course}, Canvas Ağında kaydolduğunuz ders haftaya başlıyor. Ne kadar heyecanlı olabileceğinizi biliyor ve bu heyacanınızı paylaşıyoruz.
            
            Hazırlanmak için neler yapabilirsiniz?
            
            Canvas ağ profilinizi oluşturmadıysanız giriş yapıp Canvas.net'te oluşturabilirsiniz. Profil bilgileriniz dersteki diğer kullanıcıların sizin kim olduğunuzu bilmelerine yardımcı olacaktır. Orada bildirim tercihlerinizi de ayarlayabilirsiniz.
            
            Son olarak, dersiniz için gerekli materyalleri ve açıklamaları burada bulabilirsiniz: %{url}
            
            Öğrenmeye devam,
            
            Canvas Ağ
