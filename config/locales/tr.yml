  if_users_manage_login_details_or_statistics_view_i_cff4155d: "Kullanıcılar - giriş ayrıntılarını yönet veya İstatistikler - görüntüle etkinse, kullanıcı Yönetici Araçları'nda giriş/çıkış etkinliğini oluşturabilir. Yönetici Araçları'ndaki giriş/çıkış etkinliği seçeneğini gizlemek için bu iki iznin de devre dışı olması gerekir."
