    grade_export: 
      description: "ÖBS için Notları Dışa Aktarma"
      name: "Notları Dışa Aktarma"
    grade_export_settings: 
      description: |-
          Bu eklenti, final notlarının öğrenci bilgi sistemine (ÖBS) geri yayınlanmasını sağlar. Etkinleştirildiğinde, kullanıcıya not defterinde bu notları yayınlama seçeneği sunulur. Bu, belirtilen yayınlama uç noktasına bir POST isteği yoluyla gerçekleşir. Her tür, kendi içerik biçimini ve mime türünü tanımlar. Uç noktasından gelen yanıt önemli değildir ve şu anda yok sayılır.
          
          Örneğin, Instructure formatlı CSV, mime türü ‘text/csv’ olan ve aşağıdaki sütunları içeren bir csv dosyasını belirtilen uç noktaya POST eder:
          
          “publisher\_id”, “publisher\_sis\_id”, “course\_id”, “course\_sis\_id”, “section\_id”, “section\_sis\_id”, “student\_id”, “student\_sis\_id”, “enrollment\_id”, “enrollment\_status”, “score”, ‘grade’, “custom\_grade\_status”
          
          (Not: “grade” sütunu, kurs bir notlandırma standardı belirlemişse döndürülür)
          
          Yayınlanan kurstaki her öğrenci için, yayınlanan csv dosyasında 1 veya daha fazla satır olacaktır. Özellikle, öğrencinin kursun kök hesabında sahip olduğu her oturum açma için 1 satır olacaktır. Çoğu zaman bu, öğrenci başına 1 satırla sonuçlanacaktır, ancak öğrencinin birden fazla oturum açma bilgisi varsa, her biri için bir satır olacaktır.
          “Final notu geçersiz kılmalarını dahil et” seçeneği işaretliyse ve Final Notu Geçersiz Kılma özelliği etkinleştirilmişse, geçersiz kılma notu/puanı olan öğrenciler, hesaplanan puan ve not yerine bunu alacaklardır. Özel Durum Etiketleri özelliği etkinleştirilmişse, “custom\_grade\_status” sütunu, o öğrenci için final notu geçersiz kılmalarına uygulanan tüm özel not durumlarını içerecektir.
      labels: 
        format_type: "Çıktı formatı tipi"
        include_final_grade_overrides: "Final notu geçersiz kılmaları dahil et"
        publish_endpoint: "Yayınlanacak uç nokta"
        success_timeout: "Başarılı bildirimi zaman aşımı (saniye olarak)"
        wait_for_success: "Bildirimler tamamlanırken bekleyiniz"
