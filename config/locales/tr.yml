        equation_intro: "Hesaplanmış sorular sıralı bir şekilde hesaplanan bir veya daha fazla formül kümesini temel alır. Bu formüllerde ara değişkenleri tanımlayabilirsiniz fakat, son formülün sayısal sonucu doğru cevap için kullanılandır. Örneğin: %{example} Bu formül seti için son cevap 71'dir. Fakat, ön tanımlı değişkenler olmadığı için tüm öğrenciler aynı cevap ile aynı soruyu görecektir. Değişkenler hakkında daha fazla bilgi için \"değişkenler\" sekmesine tıklayın."
        equation_variables2: "Soru metninizde köşeli parantezler kullanarak değişkenler belirleyebilirsiniz (\"[a] + [b] Nedir?\"). Her değişken için, değişken ayarına bağlı olarak bir \"Örnek Değer\" göreceksiniz. Bu sayede matematik hesabınız kontrol edilip formülün çalıştığından emin olunur. Örneğin, sorunuz \"[a] + 5 Nedir?\" ise \"a\" değişkenini tanımlamanız istenir. \"a\" için örnek değer 5.2 ise %{example} yazabilirsiniz. Bu formül ile, her kümede \"a\"nın farklı bir değeri ile herhangi bir sayıda çözüm kümeleri oluşturabilirsiniz. Öğrencinin biri soruyu \"5.2 + 5 Nedir?\" olarak görürken diğeri \"9 + 5 Nedir?\" olarak görür."
