  this_report_gives_information_about_api_requests_t_379c13a: "Bu rapor, Test ve Prod ortamlarında User-Agent üst bilgisi ayarlanmamış API istekleri hakkında bilgi verir. Bu istekler şu anda Beta'da engellenmiştir ve Test ile Üretim ortamlarında uygulama yakındır. Kesin tarihler için lütfen *API Değişiklik Günlüğü* bölümüne bakın. Test ve Üretimde istekler engellendikten sonra bu rapor artık kullanılamayacaktır."
  this_report_provides_a_list_of_all_developer_keys__dd2bfadf: "Bu rapor, kurum için kullanılabilir tüm Geliştirici Anahtarlarının listesini sağlar. Bu anahtarlar, raporun çalıştırıldığı kök hesaba doğrudan yüklenebilir veya üst kök hesaplardan devralınabilir. Geliştirici anahtarları API anahtarı veya LTI anahtarı olabilir."
  this_report_provides_all_active_eportfolios_for_th_f7432621: "Bu rapor, mevcut kurum için tüm etkin ePortfolyoları sağlar. İsteğe bağlı olarak, kapsamı yalnızca kaydı olmayan kullanıcılara ait ePortfolyolarla sınırlamak için 'Yalnızca kaydı olmayan kullanıcılara ait ePortfolyoları dahil et' seçeneğini seçin. Ayrıca, kaldırılmış ePortfolyoları da yalnızca dahil etmek için raporu 'Silinmiş Nesneleri Dahil Et' seçeneğiyle çalıştırabilirsiniz."
  this_report_provides_transparency_regarding_instru_6f9e227e: |-
      Bu rapor, Instructure çalışanlarının hesaba erişimi konusunda şeffaflık sağlar. Bir erişim yetkisi, bir Instructure çalışanının hesabınıza sınırlı bir süre için erişmesine izin verir.
      Örneğin hesabı desteklerken veya bir olaya yanıt verirken. Bir yetkinin süresi dolarsa çalışanların kullanıcı arayüzü veya API üzerinden hesaba erişmeden önce yetkilerini yenilemesi gerekir.
  this_report_shows_all_learning_outcomes_that_exist_e77bd04b: "Bu rapor, bu hesapta var olan tüm öğrenme çıktılarını gösterir. Oluşan csv dosyasında her öğrenme çıktısı için bir satır bulunur ve ilişkili özniteliklerin tüm ayrıntıları gösterilir."
  this_report_shows_all_the_activity_from_users_enro_46394fa6: |-
      Bu rapor, belirli bir derse kayıtlı kullanıcıların veya belirli bir dönemdeki tüm derslere kayıtlı kullanıcıların tüm etkinliğini gösterir. Oluşan csv dosyasında her öğrenci etkinliği için bir satır bulunur ve şu başlıkları içerir: enrollment_type, section id,
      section sis id, section name, course id, course sis id, course name, user id,
      user sis id, content type, content, times viewed, times participated, last
      viewed. times viewed ve times participated değerleri, başlangıçtan raporun üretildiği ana kadar olan sayaçlardır.
  this_report_shows_all_the_activity_from_users_enro_8f8e0ca1: |-
      Bu rapor, belirli bir dönemdeki tüm derslere kayıtlı kullanıcıların tüm etkinliğini gösterir. Oluşan csv dosyasında her öğrenci etkinliği için bir satır bulunur ve şu başlıkları içerir: section id, section sis id,
      section name, course id, course sis id, course name, term id, term sis id,
