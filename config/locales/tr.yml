  by_default_all_links_are_enabled_for_a_course_stud_8e617dbc: "Varsayılan olarak bütün bağlantılar ders içinde etkinleştirilmiştir. Öğrenciler, içeriği olmayan bölümlere verilen bağlantıları göremezler. Örneğin, hiç kısa sınav oluşturmadıysanız kısa sınav bağlantısını göremezler. Bu bağlantıları sıralayabilir ya da öğrencilerinizin erişmesini istemediğiniz ders bölümleri varsa  bunları devre dışı bırakabilirsiniz."
  by_default_students_are_able_to_create_groups_to_r_ac2a70bd: "Varsayılan olarak öğrenciler grup oluşturabilir. Öğrencilerin grup oluşturmasını kısıtlamak için Ders Ayarları'nda Öğrencilerin kendi gruplarını düzenlemesine izin ver onay kutusunu seçmeyin."
  by_default_students_can_always_create_groups_in_a__5727f4cf: "Varsayılan olarak öğrenciler bir derste her zaman grup oluşturabilir. Öğrencilerin grup oluşturmasını kısıtlamak için Dersler - yönet izni etkin olmalı ve Ders Ayarları'ndaki Öğrencilerin kendi gruplarını düzenlemesine izin ver onay kutusu seçili olmamalıdır."
  by_default_this_module_is_visible_to_everyone_5d4ef10e: "Varsayılan olarak bu modül herkes tarafından görülebilir."
  by_default_ui_changes_have_priority_over_sis_impor_38154715: "Varsayılan olarak arayüz değişiklikleri, ÖBS içe aktarma değişikliklerine göre önceliklidir. Bir yönetici arayüz üzerinden bazı alanları değiştirdiyse, ÖBS içe aktarma bu alanların verisini değiştirmez. Bu seçeneği seçerseniz, bu ÖBS içe aktarma arayüz değişikliklerini geçersiz kılar. Ayrıntılar için belgelere bakın."
