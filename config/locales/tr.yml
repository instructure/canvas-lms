  groups_are_a_good_place_to_collaborate_on_projects_7386830f: |-
      Gruplar projelerde işbirliği yapmak veya çalışma oturumları ve benzer şeyleri yapmak için idealdir.
      Her grup için takvim, wiki, tartışma ve biraz dosyalama alanı sağlanmaktadır. Gruplar bu belgeler
      üzerinde işbirliği yapabilir ve hatta web üzerinden canlı dersler düzenleyebilirler. Aslında daha çok
      proje odaklı olarak az sayıda öğrenci ile çalışabileceğiniz küçük bir derse benzetebiliriz.
  groups_are_a_good_place_to_collaborate_on_projects_92bb0c02: |-
      Gruplar, projelerde iş birliği yapmak veya ders çalışma
      oturumları gibi etkinliklerin zaman planlarını belirlemek için iyi bir yerdir. Her grubun bir takvimi, bir vikisi, tartışmaları ve
      dosya depolamak için küçük bir alanı vardır. Gruplar belgeler üzerinde birlikte çalışabilir veya hatta web konferansları planlayabilir.
      Bu, daha odaklı bir proje üzerinde daha az sayıda öğrenciyle çalışabileceğiniz mini bir ders gibidir.
  groups_are_a_good_place_to_collaborate_on_projects_fdfe57a9: |-
