    course_already_started: 
      email: 
        body: |-
            Merhaba %{user},
            
            Canvastaki %{course} dersiniz bir kaç gün önce başladı ve henüz derse giriş yapmadığınızı fark ettik. Unutmuş olabilirsiniz diye son bir hatırlatma yapmak istedik.
            
            Giriş yapmak için, %{site} adresine gidip kullanıcı adı ve şifrenizi girin. Şifre oluşturmadıysanız %{password_url} a tıklayarak oluşturabilirsiniz. Bu dersi almak istemiyorsanız %{site} adresindeki ders kataloğumuzu inceleyip ilginizi çekebilecek dersleri bulabilirsiniz. Her zaman yeni dersler eklenmektedir!
            
            Yakın zamanda görüşmek dileğiyle,
            
            Canvas Network
        course_already_started: "Dersiniz zaten başladı"
