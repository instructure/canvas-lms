  we_re_unable_to_show_a_comparison_for_these_change_26987aee: "Bu değişiklikler için bir karşılaştırma gösteremiyoruz. Değişikliklerin tam bir gösterimi için lütfen API'yi kullanın."
  we_re_writing_to_inform_you_about_upcoming_backend_53b0eeae: "Canvas örneğiniz %{instance_domain} için kimlik doğrulama sisteminde yaklaşan arka uç değişiklikleri hakkında sizi bilgilendirmek için yazıyoruz. Bu güncellemeler, platformumuzun güvenliğini, güvenilirliğini ve performansını artırmaya yönelik devam eden çalışmalarımızın bir parçasıdır."
  we_sent_a_four_character_confirmation_code_to_sms__a1123db0: "%{sms_number} SMS numarasına dört karakterli doğrulama kodu gönderdik. SMS numaranıza gelecek kod doğrultusunda aktif ediniz."
  we_suggest_apps_based_on_the_redirect_uris_please__4a76a974: "Yönlendirme URI'lerine göre uygulama öneriyoruz. API'lerimizin nasıl kullanıldığını anlamamıza yardımcı olmak için lütfen bir uygulama seçin. Özel uygulamanızı görmüyorsanız en yakın eşleşmeyi seçin."
  we_suggest_using_firefox_to_test_lti_1_3_tools_wit_f51737e2: "HTTP Canvas ile LTI 1.3 araçlarını test etmek için Firefox kullanmanızı öneririz."
