  we_customize_ai_solutions_tailored_to_the_unique_n_820f54de: "Eğitim kurumlarının benzersiz ihtiyaçlarına ve kaynaklarına göre uyarlanmış yapay zekâ çözümleri sunuyoruz. Kurumunuza özel hizmet veren yapay zekâ modellerini iyileştirmek ve eğitmek için müşteri verilerini kullanıyoruz. Kurumunuzun verileri, eğitilmiş modeller aracılığıyla yalnızca kurumunuza hizmet eder."
  we_d_love_to_hear_your_thoughts_what_s_working_wel_b64ef85c: "Görüşlerinizi duymak isteriz; nelerin iyi çalıştığını ve nelerin geliştirilebileceğini paylaşın. Paylaştığınız geri bildirimleri, ürün ve hizmetlerimizi geliştirmeye yardımcı olmak için kullanabiliriz."
  we_do_not_anticipate_any_action_required_by_your_a_1295a7f3: "Bu değişiklikler sonucunda yöneticilerinizin veya son kullanıcıların herhangi bir işlem yapmasını beklemiyoruz. Amacımız, bu geçişin tamamen şeffaf olmasıdır. Ancak ek bir güvence sağlamak için, yönlendirme tarihinden önce entegrasyonu manuel olarak doğrulamanızı öneririz. Bunu, aşağıdaki yeni giriş URL'lerine doğrudan giderek ve her zamanki gibi oturum açarak yapabilirsiniz."
  we_emailed_a_confirmation_link_to_email_address_cl_e5f1d2ae: "%{email_address} adresine bir onay mesajı gönderdik. Kaydı tamamlamak için bu mesajdaki bağlantıya tıklayın.  Filtrelenme ihtimaline karşın spam kutunuzu da kontrol edin."
  we_emailed_a_confirmation_link_to_email_click_the__10a6c3b2: "*%{email}* adresine bir onay bağlantısı gönderdik. Kaydı tamamlamak için o e-postadaki bağlantıya tıklayın. Filtrelenmiş olabileceği için lütfen istenmeyen e-posta klasörünüzü de kontrol edin."
  we_established_a_consortium_with_educational_insti_359a07ec: "Anonimleştirilmiş verileri, en iyi uygulamaları ve araştırma bulgularını paylaşan eğitim kurumlarıyla bir konsorsiyum oluşturduk. Bu, iş birliğini güçlendirir ve eğitimde yapay zekânın sorumlu gelişimini hızlandırır. Eğitimde daha iyi sonuçlar, maliyet tasarrufu ve daha fazlası için özel yapay zekâ modelleri oluşturulur."
  we_experienced_an_issue_this_reply_was_not_reporte_7622abd1: "Bir sorun yaşadık. Bu yanıt bildirilmedi."
  we_found_a_different_version_of_product_name_insta_3a645773: "Dersiniz için \"%{product_name}\" ürününün farklı bir sürümünün yüklü olduğunu tespit ettik. Bu araç beklendiği gibi çalışmazsa yeniden kaydetmeyi veya yeniden yüklemeyi deneyin."
  we_have_noticed_that_this_canvas_instance_already__89ccd05: "Bu Canvas örneğinde zaten bir Katalog yapılandırması olduğunu; ancak Kataloğun bu örneğe ait olmadığını fark ettik."
  we_know_getting_your_courses_online_quickly_during_40424e8: "Bu dönemde derslerinizi hızlıca çevrim içi ortama taşımak önceliklidir. Bu hızlı tur size şunları nasıl yapacağınızı gösterecek:"
