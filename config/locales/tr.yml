      Canvas'ta veya iş ortağı ürünlerde not geri aktarımı çözümleri kullanan müşteriler, ödev verisi doğrulama iş akışlarını geliştirmek için bu özelliği etkinleştirmelidir. Etkinleştirildiğinde bu özellik, Hesap Ayarları içinde ÖBS Eşitleme için yeni ÖBS Entegrasyonu ayarlarını (Ödev Düzeyi Not Geri Aktarımı) gösterir. ÖBS'ye Aktar özelliği seçeneği bu yeni ayara dâhil edilmiştir ve varsayılan olarak etkin olacaktır.
