      description_rs: |-
          [Google Docs](%{google_url}) gibi ücretsiz çevrimiçi araçlar öğrencilerin grup projeleri ya da belgeler üzerinde çalışmaları, ortak notlar oluşturmaları vb.
          için harika bir ortamdır. Öğretmen *veya* öğrenciler grupla işbirliği etkinlikleri oluşturabilirler.
      description_student: |-
          **İşbirliği ile neyi kastediyoruz?**  paylaşılmış bir belge
          üzerinde birlikte
          çalışmakta kullanılan web-tabanlı araçları kastediyoruz. [Google Docs](%{google_url})
          gibi kaynakları grup yayınları
          veya not tutma gibi etkinliklerde işbirliği halinde çalışmak için kullanabilirsiniz.
          Bu sayfada
          bu işbirliklerinin takibini kolayca yapılabilir ve eposta
          adreslerini alma ile uğraşmadan bu kaynaklar oluşturulabilir.
      description_teacher: |-
          **İşbirliği ile neyi kastediyoruz?**  Paylaşılan bir belge üzerinde birlikte çalışmak için öğrencilerinizin
          büyük ihtimalle bildiği Web tabanlı araçları kastediyoruz. Grup yayınları veya
          not tutma gibi etkinliklerde
          işbirliği halinde çalışmak için [Google Docs](%{google_url}) gibi kaynakları kullanabilirsiniz.
          Bu sayfada öğrenciler (ve siz) bu işbirliklerinin takibini kolayca yapabilir ve eposta
          adreslerini alma ile uğraşmadan bu kaynakları oluşturabilirsiniz.
