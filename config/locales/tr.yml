  instructure_hosts_canvas_commons_in_the_region_cho_9a57f249: "Instructure, kurumunuzun seçtiği bölgede Canvas Commons'u barındırır; bu bölge Avrupa'dır. Bu, Canvas Commons'u kullandığınızda kişisel verilerinizin Almanya'da depolanacağı ve işleneceği anlamına gelir. Bu kişisel veri unsurları şunları içerir: ad, e-posta adresi, Canvas Kullanıcı ID, Canvas giriş adı, Canvas avatarı, IP Adresi, sizin favorilediğiniz Canvas Commons kaynakları ve Canvas'taki herhangi bir kaynağa yaptığınız yorumlar. Instructure'ın gizlilik uygulamaları hakkında daha fazla bilgiyi [burada](%{url}) bulabilirsiniz."
  instructure_hosts_canvas_commons_in_the_region_cho_b0897e53: "Instructure, kurumunuzun seçtiği bölgede Canvas Commons'u barındırır; bu bölge Asya Pasifik'tir. Bu, Canvas Commons'u kullandığınızda kişisel verilerinizin Singapur'da depolanacağı ve işleneceği anlamına gelir. Bu kişisel veri unsurları şunları içerir: ad, e-posta adresi, Canvas Kullanıcı ID, Canvas giriş adı, Canvas avatarı, IP Adresi, sizin favorilediğiniz Canvas Commons kaynakları ve Canvas'taki herhangi bir kaynağa yaptığınız yorumlar. Instructure'ın gizlilik uygulamaları hakkında daha fazla bilgiyi [burada](%{url}) bulabilirsiniz."
  instructure_hosts_canvas_commons_in_the_region_cho_cd2fc75d: "Instructure, kurumunuzun seçtiği bölgede Canvas Commons'u barındırır; bu bölge ABD'dir. Bu, Canvas Commons'u kullandığınızda kişisel verilerinizin Amerika Birleşik Devletleri'nde depolanacağı ve işleneceği anlamına gelir. Bu kişisel veri unsurları şunları içerir: ad, e-posta adresi, Canvas Kullanıcı ID, Canvas giriş adı, Canvas avatarı, IP Adresi, sizin favorilediğiniz Canvas Commons kaynakları ve Canvas'taki herhangi bir kaynağa yaptığınız yorumlar. Instructure'ın gizlilik uygulamaları hakkında daha fazla bilgiyi [burada](%{url}) bulabilirsiniz."
  instructure_hosts_canvas_commons_in_the_region_cho_d4d9085f: "Instructure, kurumunuzun seçtiği bölgede Canvas Commons'u barındırır; bu bölge Kanada'dır. Bu, Canvas Commons'u kullandığınızda kişisel verilerinizin Kanada'da depolanacağı ve işleneceği anlamına gelir. Bu kişisel veri unsurları şunları içerir: ad, e-posta adresi, Canvas Kullanıcı ID, Canvas giriş adı, Canvas avatarı, IP Adresi, sizin favorilediğiniz Canvas Commons kaynakları ve Canvas'taki herhangi bir kaynağa yaptığınız yorumlar. Instructure'ın gizlilik uygulamaları hakkında daha fazla bilgiyi [burada](%{url}) bulabilirsiniz."
  instructure_hosts_canvas_commons_in_the_region_cho_ec929265: "Instructure, kurumunuzun seçtiği bölgede Canvas Commons'u barındırır; bu bölge Avustralya'dır. Bu, Canvas Commons'u kullandığınızda kişisel verilerinizin Avustralya'da depolanacağı ve işleneceği anlamına gelir. Bu kişisel veri unsurları şunları içerir: ad, e-posta adresi, Canvas Kullanıcı ID, Canvas giriş adı, Canvas avatarı, IP Adresi, sizin favorilediğiniz Canvas Commons kaynakları ve Canvas'taki herhangi bir kaynağa yaptığınız yorumlar. Instructure'ın gizlilik uygulamaları hakkında daha fazla bilgiyi [burada](%{url}) bulabilirsiniz."
