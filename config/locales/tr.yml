  if_this_setting_is_disabled_and_discussions_view_i_8a068652: "Bu ayar devre dışıyken ve Tartışmalar - görüntüle etkinse, kullanıcı Blueprint ana derste tek tek tartışmalardaki içerik kilidi ayarlarını yine de düzenleyebilir."
