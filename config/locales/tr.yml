      Bir kullanıcı daha eski bir ödevi yeniden gönderirse kayıt, yeni submitted_at tarihine güncellenir.
      Sayımlar, raporu çalıştıran hesabın ayarlı saat diliminde günün başından günün sonuna kadar yapılır.
