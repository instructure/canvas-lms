  we_re_excited_to_invite_you_to_try_our_pre_release_a32514d6: "Yayın öncesi özelliklerimizi denemeye davet ediyoruz. Bu, genel kullanıma sunulmadan önce bazı yeni özelliklerimize erken erişim sağlar. Katılım isteğe bağlıdır ve mevcut müşteri sözleşmenizin kapsamı dışındadır. Katılım için ücret alınmaz; yalnızca geliştirmemize yardımcı olacak geri bildiriminizi rica ederiz."
  we_re_grateful_for_your_willingness_to_test_things_db394f0b: "Deneyerek test etmeye ve platformumuzun geleceğini şekillendirmeye yardımcı olduğunuz için teşekkür ederiz. Fikir, öneri veya geri bildiriminiz varsa lütfen paylaşın; büyük fark yaratır."
