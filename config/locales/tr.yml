  use_modules_to_organize_your_content_and_create_a__1da4149: |-
      İçeriğinizi düzenlemek ve derste öğrencilerin ne yapması gerektiğine dair doğrusal bir akış oluşturmak için modülleri kullanın.
      Modüller, içeriği haftalara, ünitelere veya farklı bir düzen yapısına göre düzenlemek için kullanılabilir.
      Dosyalar, tartışmalar, ödevler, sınavlar ve diğer öğrenme materyallerini ekleyin.
      Bir modüle veya sonraki modül öğesine geçmeden önce ön koşulların tamamlanmasını zorunlu kılın
      veya bir modülün tamamını belirli bir tarihe kadar kilitleyin.
