  if_this_permission_is_disabled_and_users_view_logi_9dbd9236: "Bu izin devre dışıyken ve Kullanıcılar - giriş ID'lerini görüntüle etkinse, kullanıcılar giriş ID'si olarak kullanılan e-posta adreslerini yine de görür."
  if_this_permission_is_disabled_at_the_account_leve_1b0e403f: "Bu izin devre dışıyken, hesap düzeyinde kullanıcı mevcut hiçbir hesap grubunu görüntüleyemez. Ders düzeyinde ise kullanıcı, öğrenciler tarafından oluşturulan gruplar dahil, mevcut grupları görüntüleyebilir ancak erişemez."
  if_this_permission_is_disabled_users_cannot_share__72d86ee6: "Bu izin devre dışıyken kullanıcılar öğe bankalarını alt hesaplarla paylaşamaz. Yönetici rolüne sahip bir kullanıcıya bu izin verildiğinde, kullanıcı yönettiği alt hesaplarla öğe bankalarını paylaşabilir."
  if_this_permission_is_disabled_users_cannot_share__be8b1061: "Bu izin devre dışıyken kullanıcılar öğe bankalarını alt hesaplarla paylaşamaz. Ders rolüne sahip bir kullanıcıya bu izin verildiğinde, kullanıcı ilişkili olduğu alt hesaplarla öğe bankalarını paylaşabilir."
  if_this_permission_is_enabled_and_if_users_view_pr_9ba99d6: "Bu izin etkinse ve Kullanıcılar - birincil e-posta adresini görüntüle devre dışıysa, kullanıcılar giriş ID'si olarak kullanılan e-posta adreslerini görür."
  if_this_permission_is_enabled_the_learning_mastery_af45b0ca: "Bu izin etkinse, Öğrenme Ustalığı sekmesi Rubrikler sayfası yerine Öğrenme Çıktıları sayfasında görüntülenir."
