  we_apologize_for_the_inconvenience_but_an_error_oc_b5d7ff7b: "Verdiğimiz rahatsızlıktan dolayı özür dileriz; ancak aracı başlatırken bir hata oluştu. Lütfen aracı yeniden başlatmayı deneyin. Sorun devam ederse lütfen destekle iletişime geçin. Bunu kurumunuza başvurarak yapabilir veya yardım almak için Canvas yan çubuğundaki 'Yardım' düğmesine tıklayabilirsiniz."
  we_are_currently_assigning_your_students_into_grou_923be472: "Şu anda seçimlerinize göre öğrencileriniz gruplara atanıyor. Bu biraz zaman alabilir."
  we_are_currently_processing_your_files_this_may_ta_e67433a7: "Şu anda dosyalarınız işleniyor. Bu işlem, gönderimlerin dosya boyutuna bağlı olarak biraz zaman alabilir. Bu ekrandan ayrılabilir ve ödev sayfasındaki \"Yükleme Durumunu Görüntüle\" bağlantısına tıklayarak daha sonra tekrar kontrol edebilir veya durumu görmek için bu sayfayı yenileyebilirsiniz."
  we_are_introducing_a_new_page_editor_to_give_you_m_c155fdd8: "Size daha fazla esneklik sağlamak ve zaman ile emekten tasarruf ettirmek için yeni bir sayfa düzenleyicisi sunuyoruz. İş akışınıza en uygun düzenleyiciyi seçin."
  we_are_reminding_canvas_admins_of_an_important_upd_49825841: "Canvas yöneticilerine, Canvas Giriş Arayüzü ile ilgili önemli bir güncellemeyi hatırlatıyoruz. Güvenliği, erişilebilirliği ve kullanıcı deneyimini artırmak için mevcut Eski Giriş Arayüzü %{date} tarihinde resmi olarak *kullanımdan kaldırılacaktır*."
  we_are_reminding_canvas_admins_of_an_important_upd_5e0efa28: "Canvas yöneticilerine, Canvas Giriş Arayüzü ile ilgili önemli bir güncellemeyi hatırlatıyoruz. Güvenliği, erişilebilirliği ve kullanıcı deneyimini artırmak için mevcut Eski Giriş Arayüzü %{date} tarihinde resmi olarak kullanımdan kaldırılacaktır."
  we_are_replacing_lti_2_0_cpf_with_lti_1_3_asset_do_706942b6: "LTI 2.0 (CPF) yerine LTI 1.3 (Asset/Document Processor) kullanıma alınıyor. Aşağıda, tüm ödevlerinizde LTI 1.3'ü kolayca kullanmaya başlamak için yapılması gereken taşıma adımları yer almaktadır."
