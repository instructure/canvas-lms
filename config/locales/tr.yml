        edit_assignment: "Şimdi ödev için bir isim (*nerede?*) ve ödevin ait olduğu grubu girin. Dilerseniz bir son teslim tarihi de belirleyebilirsiniz. Bitirdiğinizde \"Gönder\" butonuna tıklayın."
