      scheduler_explanation_student_header: "Kaydolacağınız herhangi bir görüşme grubu yok"
      scheduler_explanation_student_paragraph_1: "\"Ofis saatleri\",  \"grup sunuları zaman aralıkları\" vb gibi öğrencilerin kayıt yaptıracakları olayları zamanlamak için öğretmenler  bu aracı kullanabilir."
      scheduler_explanation_student_paragraph_2: "Şu anda öğretmenlerinizden hiç biri geçerli bir randevu ayarlamadı. Katılınabilecek bir randevu aralığı olduğunda bilgilendiriliceksiniz."
      scheduler_explanation_teacher_header: "Randevu grubu oluşturmadınız ve katılabileceğiniz bir grup bulunmamaktadır"
      scheduler_explanation_teacher_paragraph_1: "Bu Program Yapma Aracıdır. Bu aracı, öğrencilerinizin katılmak için kayıt yaptırabilecekleri randevu grupları oluşturmak için kullanabilirsiniz."
      scheduler_explanation_teacher_paragraph_2: "Örnek olarak diyelim ki dersinizi alan her bir öğrenci ile ara sınav ödevini görüşmek istediniz. Aracı kullanarak yeni bir randevu grubu oluşturabilir, sizin için uygun olan tarih ve zamanı belirtebilir, araca bu süreyi 15'er dakikalık bloklara böldürüp her zaman bloğu için bir öğrenci ayarlamasını sağlayabilirsiniz."
      scheduler_explanation_teacher_paragraph_3: "Daha sonra öğrenciler bilgilendirilecek ve belirlenmiş zaman bloklarından birine kayıt yaptırmaları gerektiğini görecekler. Öğrenciler kendilerine uygun bir zamanı belirleyebilmeleri için diğer takvimlerin de üstünde bir takvim üzerinde zaman bloklarını görecekler."
      scheduler_explanation_teacher_paragraph_4: "*Sağ tarafta bulunan \"Randevu grubu oluştur\" butonuna tıklayarak başlayabilirsiniz. *"
