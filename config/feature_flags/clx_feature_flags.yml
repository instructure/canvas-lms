  state: hidden
  shadow: true
  display_name: "Canvas Career: Manage Bulk API & Permission"
  description: |-
    Enables the ability to manage bulk API and permission settings in Canvas Career.
horizon_autopilot:
  applies_to: RootAccount
  state: hidden
  shadow: true
