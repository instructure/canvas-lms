horizon_learning_library_ms3:
  applies_to: RootAccount
  state: hidden
  shadow: true
  display_name: "Canvas Career: Learning Library Milestone 3"
  description: |-
    Enables Learning Library recommendation features in Canvas Career.
horizon_chart_view:
  applies_to: RootAccount
  state: hidden
  shadow: true
  display_name: "Canvas Career: Chart View"
  description: |-
    Enables chart view in Canvas Career.
horizon_native_permissions_page:
  applies_to: RootAccount
  state: hidden
  shadow: true
