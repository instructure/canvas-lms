---
file_association_access:
  state: hidden
  shadow: true
  applies_to: RootAccount
  display_name: File Association Access
  description: Allow users to access files associated with a course
file_association_access_conversation:
  state: hidden
  shadow: true
  applies_to: RootAccount
  display_name: File Association Access For Conversations
  description: Allow users to access files associated with a conversation when viewing the conversation messages (this does what file_association_access does, the difference is that it only applies to the conversation messages)
  environments:
    development:
      state: allowed_on
    ci:
      state: allowed_on
disable_file_verifier_access:
  state: hidden
  shadow: true
  applies_to: RootAccount
  display_name: Disable File Verifier Access
  description: Disable access to the file verifier through UUID
disable_adding_uuid_verifier_in_api:
  state: hidden
  shadow: true
  applies_to: RootAccount
  display_name: Disable adding verifiers to file URLs in the API
  description: This will disable self-authorized file URLs in the API.  When this is enabled, file URLs will need to be accessed with authentication.
  environments:
    development:
      state: allowed_on
    ci:
      state: allowed_on
disable_file_verifiers_in_public_syllabus:
  state: hidden
  shadow: true
  applies_to: RootAccount
  display_name: Disable verifiers in Public Syllabus
  description: Disable url file verifiers in the public syllabus
  environments:
    development:
      state: allowed_on
    ci:
      state: allowed_on
disable_verified_content_export_links:
  state: allowed_on
  shadow: true
  applies_to: SiteAdmin
  display_name: Disable Verified Content Export Links
  description: When turning this on, links on the Content Exports page will not use JWT-verified links.
  environments:
enable_file_access_with_api_tokens:
  state: hidden
  shadow: true
  applies_to: RootAccount
  display_name: Enable File Access with API Tokens
  description: Allow file authorization with API tokens.  This will allow API users to download files without a file verifier.
  environments:
    development:
      state: allowed_on
    ci:
      state: allowed_on
allow_attachment_association_creation:
  state: allowed
  shadow: true
  applies_to: RootAccount
  display_name: Allow Attachment Association Creation
  description: Allow attachment associations creation for any attachments on Canvas assets
  environments:
    development:
      state: allowed_on
    ci:
      state: allowed_on
log_cross_domain_file_access:
  state: hidden
  applies_to: SiteAdmin
  display_name: Log cross-domain File Access
  description: |-
    If enabled, an event will be emitted to DataDog when cross-domain
    file access occurs
  environments:
    development:
      state: allowed
    beta:
      state: hidden
    production:
      state: hidden
log_uuid_verifier_usage:
  state: hidden
  applies_to: SiteAdmin
  display_name: Log UUID Verifier Usage
  description: |-
    If enabled, an event will be emitted to DataDog when a file is
    accessed using a legacy UUID verifier
  environments:
    development:
      state: allowed
    beta:
      state: hidden
    production:
      state: hidden
